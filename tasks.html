<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新手任务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .phone-frame {
            width: 375px;
            height: 667px;
            background-color: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }
        
        .status-bar {
            height: 44px;
            background-color: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 14px;
        }
        
        .content {
            padding: 20px;
            min-height: 580px;
        }
        
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .back-button {
            width: 24px;
            height: 24px;
            margin-right: 8px;
            cursor: pointer;
        }
        
        .title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .close-button {
            margin-left: auto;
            width: 24px;
            height: 24px;
            cursor: pointer;
        }
        
        /* 进度条样式 */
        .progress-bar {
            height: 8px;
            background-color: #e0e0e0;
            border-radius: 4px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background-color: #007AFF;
            border-radius: 4px;
            width: 25%;
            transition: width 0.3s ease;
        }
        
        /* 任务列表样式 */
        .task-item {
            background-color: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .task-info {
            flex: 1;
        }
        
        .task-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .task-desc {
            font-size: 12px;
            color: #666;
        }
        
        .task-action {
            padding: 8px 16px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        
        .btn-secondary {
            background-color: #f0f0f0;
            color: #333;
        }
        
        .btn-disabled {
            background-color: #e0e0e0;
            color: #999;
            cursor: not-allowed;
        }
        
        /* 弹窗样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background-color: white;
            border-radius: 16px;
            padding: 24px;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .modal-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 24px;
        }
        
        .btn-primary {
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background-color: #0056b3;
        }
        
        /* 隐藏类 */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <!-- 状态栏 -->
        <div class="status-bar">
            <div>9:41</div>
            <div>信号 电池</div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <!-- 头部 -->
            <div class="header">
                <div class="back-button" id="backButton">←</div>
                <div class="title">新手任务</div>
                <div class="close-button" id="closeButton">×</div>
            </div>
            
            <!-- 进度条 -->
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <!-- 任务列表 -->
            <div class="task-list">
                <div class="task-item">
                    <div class="task-info">
                        <div class="task-title">领取星球会员</div>
                        <div class="task-desc">点击领取星球会员卡</div>
                    </div>
                    <div class="task-action btn-secondary" id="task1">去领取</div>
                </div>
                
                <div class="task-item">
                    <div class="task-info">
                        <div class="task-title">绑定星球账号</div>
                        <div class="task-desc">了解绑定星球账号的好处</div>
                    </div>
                    <div class="task-action btn-secondary" id="task2">去绑定</div>
                </div>
                
                <div class="task-item">
                    <div class="task-info">
                        <div class="task-title">扫码添加鱼丸</div>
                        <div class="task-desc">获取专属社群服务</div>
                    </div>
                    <div class="task-action btn-disabled">已添加</div>
                </div>
                
                <div class="task-item">
                    <div class="task-info">
                        <div class="task-title">填写新人登记表</div>
                        <div class="task-desc">填写成功后显示已填写</div>
                    </div>
                    <div class="task-action btn-secondary" id="task4">去填写</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 任务完成弹窗 -->
    <div class="modal hidden" id="completeModal">
        <div class="modal-content">
            <div class="modal-title">任务完成</div>
            <div class="modal-desc">恭喜你完成了任务！</div>
            <button class="btn-primary" id="closeCompleteModal">确定</button>
        </div>
    </div>
    
    <!-- 所有任务完成弹窗 -->
    <div class="modal hidden" id="allTasksCompleteModal">
        <div class="modal-content">
            <div class="modal-title">新手任务完成</div>
            <div class="modal-desc">恭喜你完成了所有新手任务！</div>
            <button class="btn-primary" id="closeAllTasksModal">确定</button>
        </div>
    </div>
    
    <script>
        // 任务完成状态
        let tasks = {
            task1: false, // 领取星球会员
            task2: false, // 绑定星球账号
            task3: true,  // 扫码添加鱼丸（已完成）
            task4: false  // 填写新人登记表
        };
        
        // 检查是否所有任务都已完成
        function checkAllTasksCompleted() {
            return Object.values(tasks).every(Boolean);
        }
        
        // 计算完成进度
        function updateProgress() {
            const completed = Object.values(tasks).filter(Boolean).length;
            const total = Object.values(tasks).length;
            const progress = (completed / total) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
            
            // 检查是否所有任务都已完成
            if (checkAllTasksCompleted()) {
                // 所有任务完成后显示完成提示
                setTimeout(() => {
                    document.getElementById('allTasksCompleteModal').classList.remove('hidden');
                }, 500);
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateProgress();
            
            // 返回按钮
            document.getElementById('backButton').addEventListener('click', function() {
                window.location.href = 'index.html';
            });
            
            // 关闭按钮
            document.getElementById('closeButton').addEventListener('click', function() {
                window.location.href = 'index.html';
            });
            
            // 任务点击事件
            document.getElementById('task1').addEventListener('click', function() {
                completeTask('task1');
            });
            
            document.getElementById('task2').addEventListener('click', function() {
                completeTask('task2');
            });
            
            document.getElementById('task4').addEventListener('click', function() {
                completeTask('task4');
            });
            
            // 关闭完成弹窗
            document.getElementById('closeCompleteModal').addEventListener('click', function() {
                document.getElementById('completeModal').classList.add('hidden');
            });
            
            // 关闭所有任务完成弹窗
            document.getElementById('closeAllTasksModal').addEventListener('click', function() {
                document.getElementById('allTasksCompleteModal').classList.add('hidden');
            });
        });
        
        // 完成任务
        function completeTask(taskId) {
            tasks[taskId] = true;
            updateProgress();
            
            // 更新按钮状态
            const button = document.getElementById(taskId);
            button.classList.remove('btn-secondary');
            button.classList.add('btn-disabled');
            
            // 根据任务ID更新按钮文本
            switch(taskId) {
                case 'task1':
                    button.textContent = '已领取';
                    break;
                case 'task2':
                    button.textContent = '已绑定';
                    break;
                case 'task4':
                    button.textContent = '已填写';
                    break;
                default:
                    button.textContent = '已完成';
            }
            
            // 显示完成弹窗
            document.getElementById('completeModal').classList.remove('hidden');
        }
    </script>
</body>
</html>
