<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>418 分销排行榜</title>
<style>
/* === Reset & Base === */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: PingFang SC, Tahoma, Helvetica, Arial, Hiragino Sans GB, Microsoft YaHei, sans-serif;
  background: #F2F5F7;
  color: #242528;
  min-height: 100vh;
  max-width: 375px;
  margin: 0 auto;
  position: relative;
}

/* === Color Tokens === */
:root {
  --color-primary: #36A590;
  --color-primary-light: #E9FFF8;
  --color-primary-border: #BCEDDD;
  --color-accent: #FF7D00;
  --color-accent-dark: #D25F00;
  --color-bg: #F2F5F7;
  --color-card: #FFFFFF;
  --color-text-1: #242528;
  --color-text-2: #3B3D40;
  --color-text-3: #757980;
  --color-text-4: #BDC1C7;
  --color-border: #E4E4E7;
  --color-success: #52C41A;
  --color-success-bg: #F4FFE8;
  --color-danger: #F54A45;
  --color-danger-bg: #FFEDE8;
  --radius-btn: 6px;
  --radius-card: 8px;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.05);
}

/* === Header === */
.header {
  background: linear-gradient(162deg, #FF7D00, #D25F00);
  padding: 48px 16px 24px;
  color: #fff;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 120px; height: 120px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
}
.header::after {
  content: '';
  position: absolute;
  bottom: -30px; left: -20px;
  width: 80px; height: 80px;
  background: rgba(255,255,255,0.08);
  border-radius: 50%;
}
.header-title {
  font-size: 22px;
  font-weight: 700;
  line-height: 32px;
  position: relative;
  z-index: 1;
}
.header-subtitle {
  font-size: 13px;
  line-height: 20px;
  opacity: 0.8;
  margin-top: 4px;
  position: relative;
  z-index: 1;
}
.header-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 12px;
  padding: 4px 12px;
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  font-size: 12px;
  line-height: 18px;
  position: relative;
  z-index: 1;
}
.header-status .dot {
  width: 6px; height: 6px;
  background: #52FF6A;
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* === My Rank Card === */
.my-rank-card {
  margin: -12px 16px 16px;
  background: var(--color-card);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  padding: 16px;
  position: relative;
  z-index: 2;
}
.my-rank-login {
  text-align: center;
  padding: 8px 0;
}
.my-rank-login p {
  font-size: 13px;
  color: var(--color-text-3);
  margin-bottom: 12px;
}
.btn-wx-login {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 20px;
  height: 36px;
  background: #07C160;
  color: #fff;
  border: none;
  border-radius: var(--radius-btn);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 100ms;
}
.btn-wx-login:active { opacity: 0.9; }
.btn-wx-login svg { width: 18px; height: 18px; }

.my-rank-info {
  display: none;
}
.my-rank-info.show {
  display: flex;
  align-items: center;
  gap: 12px;
}
.my-rank-info .rank-number {
  width: 40px; height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--color-primary-light);
  color: var(--color-primary);
  border-radius: 50%;
  font-size: 18px;
  font-weight: 700;
  font-family: DIN, PingFang SC, sans-serif;
  flex-shrink: 0;
}
.my-rank-info .user-meta {
  flex: 1;
  min-width: 0;
}
.my-rank-info .user-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.my-rank-info .avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}
.my-rank-info .nickname {
  font-size: 15px;
  font-weight: 700;
  color: var(--color-text-1);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.my-rank-info .star-id {
  font-size: 12px;
  color: var(--color-text-3);
  margin-top: 2px;
}
.my-rank-info .deal-count {
  text-align: right;
  flex-shrink: 0;
}
.my-rank-info .deal-count .num {
  font-size: 20px;
  font-weight: 700;
  color: var(--color-accent);
  font-family: DIN, PingFang SC, sans-serif;
}
.my-rank-info .deal-count .label {
  font-size: 11px;
  color: var(--color-text-3);
}

/* === Rank List === */
.rank-section {
  padding: 0 16px 16px;
}
.rank-section-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--color-text-1);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.rank-list {
  background: var(--color-card);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  overflow: hidden;
}

/* Table Header */
.rank-list-header {
  display: grid;
  grid-template-columns: 48px 1fr 80px 56px;
  align-items: center;
  padding: 10px 12px;
  background: var(--color-bg);
  font-size: 12px;
  color: var(--color-text-3);
  border-bottom: 1px solid var(--color-border);
}
.rank-list-header .col-deal {
  text-align: right;
}

/* Table Row */
.rank-row {
  display: grid;
  grid-template-columns: 48px 1fr 80px 56px;
  align-items: center;
  padding: 12px;
  border-bottom: 1px solid var(--color-border);
  cursor: pointer;
  transition: background 100ms;
}
.rank-row:last-child { border-bottom: none; }
.rank-row:active { background: var(--color-bg); }

/* Current user highlight */
.rank-row.current-user {
  background: var(--color-primary-light);
  border-left: 3px solid var(--color-primary);
  padding-left: 9px;
}

/* Rank number */
.rank-num {
  font-size: 16px;
  font-weight: 700;
  color: var(--color-text-2);
  text-align: center;
  font-family: DIN, PingFang SC, sans-serif;
}
.rank-num.gold { color: transparent; font-size: 0; }
.rank-num.gold::before { content: '🥇'; font-size: 22px; }
.rank-num.silver { color: transparent; font-size: 0; }
.rank-num.silver::before { content: '🥈'; font-size: 22px; }
.rank-num.bronze { color: transparent; font-size: 0; }
.rank-num.bronze::before { content: '🥉'; font-size: 22px; }

/* User cell */
.rank-user {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}
.rank-user .avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}
.rank-user .name {
  font-size: 14px;
  font-weight: 500;
  color: var(--color-text-1);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Star ID */
.rank-star {
  font-size: 12px;
  color: var(--color-text-3);
  font-family: DIN, PingFang SC, sans-serif;
}

/* Deal count */
.rank-deal {
  font-size: 16px;
  font-weight: 700;
  color: var(--color-text-1);
  text-align: right;
  font-family: DIN, PingFang SC, sans-serif;
}
.rank-row.current-user .rank-deal {
  color: var(--color-primary);
}

/* Top 3 special */
.rank-row:nth-child(2) .rank-deal { color: var(--color-accent); }
.rank-row:nth-child(3) .rank-deal { color: var(--color-accent); }
.rank-row:nth-child(4) .rank-deal { color: var(--color-accent); }

/* === Detail Page === */
.detail-page {
  display: none;
  min-height: 100vh;
  background: var(--color-bg);
}
.detail-page.show {
  display: block;
}

/* Detail Nav */
.detail-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: var(--color-card);
  border-bottom: 1px solid var(--color-border);
  position: sticky;
  top: 0;
  z-index: 10;
}
.btn-back {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px; height: 32px;
  background: none;
  border: none;
  cursor: pointer;
  border-radius: var(--radius-btn);
  transition: background 100ms;
}
.btn-back:active { background: var(--color-bg); }
.btn-back svg { width: 20px; height: 20px; color: var(--color-text-1); }
.detail-nav-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--color-text-1);
}

/* Detail User Summary */
.detail-user-summary {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px;
  background: var(--color-card);
  margin-bottom: 12px;
}
.detail-user-summary .avatar {
  width: 48px; height: 48px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}
.detail-user-summary .info {
  flex: 1;
}
.detail-user-summary .nickname {
  font-size: 16px;
  font-weight: 700;
  color: var(--color-text-1);
}
.detail-user-summary .star-id {
  font-size: 13px;
  color: var(--color-text-3);
  margin-top: 2px;
}

/* Stats Cards */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 0 16px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--color-card);
  border-radius: var(--radius-card);
  padding: 16px;
  text-align: center;
  box-shadow: var(--shadow-card);
}
.stat-card .stat-num {
  font-size: 28px;
  font-weight: 700;
  font-family: DIN, PingFang SC, sans-serif;
}
.stat-card .stat-label {
  font-size: 12px;
  color: var(--color-text-3);
  margin-top: 4px;
}
.stat-card.success .stat-num { color: var(--color-success); }
.stat-card.danger .stat-num { color: var(--color-danger); }

/* Detail List */
.detail-list-section {
  padding: 0 16px 16px;
}
.detail-list-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--color-text-1);
  margin-bottom: 12px;
}
.detail-list {
  background: var(--color-card);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  overflow: hidden;
}
.detail-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  border-bottom: 1px solid var(--color-border);
}
.detail-row:last-child { border-bottom: none; }
.detail-row .avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}
.detail-row .info {
  flex: 1;
  min-width: 0;
}
.detail-row .name {
  font-size: 14px;
  font-weight: 500;
  color: var(--color-text-1);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.detail-row .name.refunded {
  text-decoration: line-through;
  color: var(--color-text-3);
}
.detail-row .star-id {
  font-size: 12px;
  color: var(--color-text-3);
  margin-top: 2px;
}
.detail-row .status-tag {
  padding: 2px 8px;
  border-radius: var(--radius-btn);
  font-size: 12px;
  font-weight: 500;
  flex-shrink: 0;
}
.status-tag.paid {
  background: var(--color-success-bg);
  color: var(--color-success);
}
.status-tag.refunded {
  background: var(--color-danger-bg);
  color: var(--color-danger);
}

/* === Rank List Page Container === */
.rank-page {
  display: block;
}
.rank-page.hide {
  display: none;
}

/* === Empty State === */
.empty-state {
  text-align: center;
  padding: 40px 16px;
  color: var(--color-text-3);
  font-size: 14px;
}
</style>
</head>

    { name: '吴十', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=ws', starId: '#80008', status: 'paid' },
    { name: '郑十一', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=zs', starId: '#80009', status: 'paid' },
    { name: '刘十二', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=ls', starId: '#80010', status: 'paid' },
  ]
};

// === Render ===
function renderRankList() {
  const body = document.getElementById('rankListBody');
  body.innerHTML = rankData.map((item, index) => {
    const rank = index + 1;
    let rankClass = '';
    if (rank === 1) rankClass = 'gold';
    else if (rank === 2) rankClass = 'silver';
    else if (rank === 3) rankClass = 'bronze';

    const isCurrent = isLoggedIn && item.id === CURRENT_USER_ID;
    const rowClass = isCurrent ? 'rank-row current-user' : 'rank-row';
    const clickHandler = isCurrent ? `onclick="showDetail(${item.id})"` : '';

    return `
      <div class="${rowClass}" ${clickHandler}>
        <div class="rank-num ${rankClass}">${rank}</div>
        <div class="rank-user">
          <img class="avatar" src="${item.avatar}" alt="">
          <span class="name">${item.name}</span>
        </div>
        <span class="rank-star">${item.starId}</span>
        <span class="rank-deal">${item.deals}</span>
      </div>
    `;
  }).join('');
}

function mockLogin() {
  isLoggedIn = true;
  document.getElementById('loginPrompt').style.display = 'none';
  document.getElementById('myRankInfo').classList.add('show');

  // 找到当前用户排名
  const userIndex = rankData.findIndex(d => d.id === CURRENT_USER_ID);
  if (userIndex >= 0) {
    document.getElementById('myRankNum').textContent = userIndex + 1;
    document.getElementById('myDealCount').textContent = rankData[userIndex].deals;
  }

  renderRankList();
}

function showDetail(userId) {
  const user = rankData.find(d => d.id === userId);
  if (!user) return;

  document.getElementById('detailAvatar').src = user.avatar;
  document.getElementById('detailNickname').textContent = user.name;
  document.getElementById('detailStarId').textContent = user.starId;
  document.getElementById('statValid').textContent = user.validDeals;
  document.getElementById('statRefund').textContent = user.refundDeals;

  // Render detail list
  const details = detailData[userId] || [];
  const listBody = document.getElementById('detailListBody');
  if (details.length === 0) {
    listBody.innerHTML = '<div class="empty-state">暂无成交记录</div>';
  } else {
    listBody.innerHTML = details.map(d => `
      <div class="detail-row">
        <img class="avatar" src="${d.avatar}" alt="">
        <div class="info">
          <div class="name ${d.status === 'refunded' ? 'refunded' : ''}">${d.name}</div>
          <div class="star-id">${d.starId}</div>
        </div>
        <span class="status-tag ${d.status}">${d.status === 'paid' ? '已付款' : '已退款'}</span>
      </div>
    `).join('');
  }

  document.getElementById('rankPage').classList.add('hide');
  document.getElementById('detailPage').classList.add('show');
}

function showRankPage() {
  document.getElementById('detailPage').classList.remove('show');
  document.getElementById('rankPage').classList.remove('hide');
}

// Init
renderRankList();
</script>
