<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 新手任务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .phone-frame {
            width: 375px;
            height: 667px;
            background-color: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }
        
        .status-bar {
            height: 44px;
            background-color: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 14px;
        }
        
        .content {
            padding: 20px;
            min-height: 580px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .home-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .home-desc {
            font-size: 16px;
            color: #666;
            margin-bottom: 32px;
            text-align: center;
        }
        
        /* 悬浮入口样式 */
        .floating-entry {
            position: absolute;
            top: 60px;
            right: 16px;
            padding: 8px 16px;
            background-color: #f0f0f0;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 999;
            transition: all 0.3s ease;
        }
        
        .floating-entry:hover {
            transform: scale(1.05);
        }
        
        .floating-entry img {
            width: 32px;
            height: 32px;
        }
        
        .floating-entry .close-btn {
            width: 20px;
            height: 20px;
            background-color: #e0e0e0;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #666;
            font-size: 12px;
            font-weight: bold;
        }
        
        /* 弹窗样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background-color: white;
            border-radius: 16px;
            padding: 24px;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .modal-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 24px;
        }
        
        .btn-primary {
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        
        .btn-secondary {
            background-color: #f0f0f0;
            color: #333;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }
        
        /* 隐藏类 */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <!-- 状态栏 -->
        <div class="status-bar">
            <div>9:41</div>
            <div>信号 电池</div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <div class="home-title">欢迎来到星球！</div>
            <div class="home-desc">完成新手任务，开启你的赚钱之旅</div>
        </div>
        
        <!-- 悬浮入口 -->
        <div class="floating-entry" id="floatingEntry">
            <span style="font-size: 14px; color: #333; margin-right: 8px;">点击前往完成新手任务</span>
            <div class="close-btn" id="closeFloatingEntry">×</div>
        </div>
    </div>
    
    <!-- 首页弹窗 -->
    <div class="modal" id="homeModal">
        <div class="modal-content">
            <div class="modal-title">完成新手任务</div>
            <div class="modal-desc">开启你的赚钱第一课</div>
            <button class="btn-primary" id="goToTasks">去完成</button>
            <button class="btn-secondary" id="closeHomeModal">关闭</button>
        </div>
    </div>
    
    <script>
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 显示首页弹窗
            setTimeout(() => {
                document.getElementById('homeModal').classList.remove('hidden');
            }, 500);
            
            // 关闭弹窗
            document.getElementById('closeHomeModal').addEventListener('click', function() {
                document.getElementById('homeModal').classList.add('hidden');
            });
            
            // 跳转到新手任务页面
            document.getElementById('goToTasks').addEventListener('click', function() {
                window.location.href = 'tasks.html';
            });
            
            // 悬浮入口点击事件
            document.getElementById('floatingEntry').addEventListener('click', function(e) {
                // 阻止事件冒泡，避免点击关闭按钮时触发跳转
                if (e.target.id !== 'closeFloatingEntry') {
                    window.location.href = 'tasks.html';
                }
            });
            
            // 关闭悬浮入口
            document.getElementById('closeFloatingEntry').addEventListener('click', function(e) {
                e.stopPropagation(); // 阻止事件冒泡
                document.getElementById('floatingEntry').style.display = 'none';
            });
        });
    </script>
</body>
</html>
